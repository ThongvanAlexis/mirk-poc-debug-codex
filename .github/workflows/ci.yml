name: CI

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

jobs:
  gates:
    name: Phase 1 Gates
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.7'
          channel: stable
          cache: true

      - name: Resolve dependencies
        run: flutter pub get

      - name: Check formatting
        run: dart format --line-length 160 --set-exit-if-changed .

      - name: Analyze
        run: flutter analyze --fatal-infos --fatal-warnings

      - name: Check file headers
        run: dart run tool/check_headers.dart

      - name: Check licenses
        run: dart run tool/check_licenses.dart

      - name: Check dependency manifest
        run: dart run tool/check_dependencies_md.dart

      - name: Test guard scripts
        run: dart test tool/test/

      - name: Test Flutter app
        run: flutter test
