name: mirk_poc_debug
description: MirkFall flutter_map fog-of-war proof of concept.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.11.0 <4.0.0'
  flutter: '>=3.41.0 <3.42.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: 1.0.9
  path_provider: 2.1.5
  path: 1.9.1
  crypto: 3.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: 6.0.0
  yaml: 3.1.3
  test: 1.30.0

flutter:
  uses-material-design: true
  assets:
    - assets/maps/Fra_Melun.pmtile
